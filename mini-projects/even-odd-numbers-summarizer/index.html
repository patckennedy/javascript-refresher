<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Even & Odd Numbers Summarizer</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- JavaScript -->
    <script defer src="script.js"></script>
</head>
<body>
    <main class="app">
        <header>
            <h1>Even & Odd Numbers Summarizer</h1>
        </header>

        <section class="container">
            <label for="number-input">Enter Numbers</label>

            <input 
                type="text" 
                id="number-input" 
                placeholder="e.g. 1,2,3,4"
            />

            <button id="analyze-btn">Analyze</button>

            <div id="results">
                <p>
                    <strong>Even Numbers:</strong> 
                    <span id="even-output"></span>
                </p>
                <p>
                    <strong>Odd Numbers:</strong> 
                    <span id="odd-output"></span>
                </p>
            </div>
        </section>
    </main>
</body>
</html>
