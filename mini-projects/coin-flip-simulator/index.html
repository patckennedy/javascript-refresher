<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Coin Flip Simulator</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <h1>🪙 Coin Flip Simulator</h1>

            <p class="instructions">Click the button to flip the coin.</p>

            <div id="coin" class="coin">❓</div>

            <button id="flip-btn">Flip Coin</button>

            <p id="result" class="result">Waiting for flip...</p>
        </div>

        <script src="script.js"></script>
    </body>
</html>
