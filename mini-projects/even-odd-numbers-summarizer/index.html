<body>
    <h1>Even & Odd Numbers Summarizer</h1>

    <div class="container">
        <input 
            type="text" 
            id="number-input" 
            placeholder="Enter numbers separated by commas (e.g. 1,2,3)"
        />

        <button id="analyze-btn">Analyze</button>

        <div id="results">
            <p><strong>Even Numbers:</strong> <span id="even-output"></span></p>
            <p><strong>Odd Numbers:</strong> <span id="odd-output"></span></p>
        </div>
    </div>
</body>
