<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Random Gradient Generator</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main class="container">
            <h1>Random Gradient Generator 🎨</h1>
            <p class="subtitle">
                Click the button to generate a random gradient.
            </p>

            <div class="card">
                <div
                    id="gradient-box"
                    class="gradient-box"
                    aria-label="Gradient preview box"
                ></div>

                <p id="gradient-code" class="code">
                    linear-gradient(90deg, #ff7e5f, #feb47b)
                </p>

                <button
                    id="generate-btn"
                    type="button"
                    aria-label="Generate a new gradient"
                >
                    Generate Gradient
                </button>
            </div>
        </main>

        <script src="script.js"></script>
    </body>
</html>
